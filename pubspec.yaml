name: gpstracking
description: "GPS Tracker - Child & Parent unified app"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  provider: ^6.1.2
  table_calendar: ^3.0.9

  # Auth (local token + session storage)
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^14.0.0
  permission_handler: ^11.4.0
  location: ^8.0.0

  # Local Storage (offline-first)
  sqflite: ^2.4.2
  path: ^1.9.1

  # HTTP
  http: ^1.4.0

  # WebSocket Relay
  socket_io_client: ^3.0.2

  # Map Display
  flutter_map: ^8.0.0
  latlong2: ^0.9.1

  # Background Service
  flutter_background_service: ^5.0.17
  flutter_local_notifications: ^18.0.1
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - settings.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
